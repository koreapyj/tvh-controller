# Single configuration file for tvh-controller. Copy to config.yaml.
# Lookup order: $TVHC_CONFIG, ./config.yaml, /etc/tvhc/config.yaml

# port: 8080

# MariaDB/MySQL DSN. Omit to run without persistence (overview only;
# rule sync and uploads disabled).
database: mysql://tvhc:CHANGEME@localhost:3306/tvhc

instances:
  - id: zone1
    name: Zone 1
    url: http://192.168.1.10:9981
    # only when tvheadend requires auth:
    # username: controller
    # password: CHANGEME
    rclone:
      rcUrl: http://192.168.1.10:5572
      # only when rcd runs without --rc-no-auth:
      # user: tvhc
      # pass: CHANGEME
      # rewrite tvheadend's recording path to the path rclone rcd sees
      # (identical when both run directly on the host):
      # recordingPathPrefix: { from: /recordings, to: /recordings }
    # restreamer daemon nodes at this location (omit to disable restreaming here):
    # restreamer:
    #   nodes:
    #     - id: node1
    #       url: http://192.168.1.10:5580
    #       # public HLS base for viewer-facing links (omit if not directly serveable):
    #       serveUrl: https://tv1.example.com
    #       # expected serving bandwidth budget in Mbps (used by the rebalancer):
    #       egressMbps: 500
  - id: zone2
    name: Zone 2
    url: http://192.168.2.10:9981
    rclone:
      rcUrl: http://192.168.2.10:5572
  # tvh-less zone: an explicit `url: null` means this location has NO
  # tvheadend — it exists purely to host restreamer nodes fed by their m3u
  # source catalogs. No tvheadend machinery is created for it, rule sync
  # scope "all" skips it, and username/password/serverOffset/rclone are
  # rejected (meaningless without a tvheadend).
  # - id: zone3
  #   name: Zone 3 (restreamer only)
  #   url: null
  #   restreamer:
  #     nodes:
  #       - id: node1
  #         url: http://192.168.3.10:5580
  #         serveUrl: https://tv3.example.com

rclone:
  remote: "gdrive:tvh-archive"

# Automatically archive every finished recording's best copy. Waits while a
# sibling instance is still recording the same broadcast, ignores failed
# copies; failed auto-uploads are retried manually only.
# autoUpload: true
# ...or with the post-finish settling grace (seconds, default 120):
# autoUpload: { enabled: true, graceSeconds: 120 }

# Autorec rule start times are displayed converted into broadcast (EIT) time
# when it differs from the tvheadend host's timezone. The EIT zone is read
# from tvheadend itself (each network's "EIT time offset"); the host timezone
# is auto-detected via the co-located rclone rcd, or set per instance:
#   serverOffset: "+00:00"

# Standalone HLS switcher service(s) for redundant restream channels
# (multi-placement failover). Omit when no channel is placed on more than
# one instance. Each switcher's publicUrl is the viewer-facing base used in
# M3U playlists. The top-level publicUrl is the CONTROLLER's own viewer-facing
# base, used for controller-hosted M3U links (the channel-logo proxy); when
# omitted it is derived per request from X-Forwarded-Proto/Host set by the
# reverse proxy (or from the request itself).
# restreamer:
#   publicUrl: https://ctrl.example.com
#   switchers:
#     - id: main
#       url: http://switcher.internal:5581
#       publicUrl: https://tv.example.com

# optional overrides (milliseconds / ratio)
# pollIntervals: { dvr: 15000, autorec: 60000, topology: 600000, restreamer: 15000 }
# overlapThreshold: 0.7
