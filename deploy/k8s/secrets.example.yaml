# Copy to secrets.yaml, fill in real values, and `kubectl apply -f` it.
# Do NOT commit secrets.yaml. The whole config is a Secret because it
# carries the database DSN (and any tvheadend/rclone credentials).
apiVersion: v1
kind: Secret
metadata:
  name: tvhc-config
type: Opaque
stringData:
  config.yaml: |
    database: mysql://tvhc:CHANGEME@mariadb.default.svc:3306/tvhc
    instances:
      - id: zone1
        name: Zone 1
        url: http://tvh-zone1.example.lan:9981
        rclone:
          rcUrl: http://tvh-zone1.example.lan:5572
      - id: zone2
        name: Zone 2
        url: http://tvh-zone2.example.lan:9981
        rclone:
          rcUrl: http://tvh-zone2.example.lan:5572
    rclone:
      remote: "gdrive:tvh-archive"
